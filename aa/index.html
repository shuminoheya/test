<html>
<head>
    <title>Explorer Style Archive Viewer</title>
    <style>
        body {
            font-family: sans-serif;
            margin: 0;
            display: flex;
            height: 100vh;
        }

        /* 左のツリー */
        .sidebar {
            width: 200px;
            background: #f3f3f3;
            border-right: 1px solid #ccc;
            padding: 10px;
        }

        /* 右のファイル一覧 */
        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        /* 上のバー */
        .toolbar {
            background: #eaeaea;
            padding: 8px;
            border-bottom: 1px solid #ccc;
        }

        /* ファイル一覧テーブル */
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th, td {
            padding: 6px 10px;
            border-bottom: 1px solid #ddd;
        }
        th {
            background: #f5f5f5;
            text-align: left;
        }
    </style>
</head>
<body>

    <div class="sidebar">
        <h4>Archive</h4>
        <div id="folderTree">No folder structure</div>
    </div>

    <div class="main">
        <div class="toolbar">
            Choose file: <input type="file" id="file" />
        </div>

        <table>
            <thead>
                <tr>
                    <th>Name</th>
                    <th>Size</th>
                </tr>
            </thead>
            <tbody id="fileList"></tbody>
        </table>
    </div>

    <script type="module">
        import {Archive} from 'main.js';

        Archive.init({
            workerUrl: 'worker-bundle.js'
        });

        document.getElementById('file').addEventListener('change', async (e) => {
            const file = e.currentTarget.files[0];
            const archive = await Archive.open(file);
            await archive.extractFiles(addFileRow);
        });

        function addFileRow(entry){
            const tbody = document.getElementById('fileList');

            const tr = document.createElement('tr');

            const name = document.createElement('td');
            const link = document.createElement('a');
            link.textContent = entry.path;
            link.setAttribute('download', entry.file.name);
            name.appendChild(link);

            const size = document.createElement('td');
            size.textContent = entry.file.size + " bytes";

            tr.appendChild(name);
            tr.appendChild(size);
            tbody.appendChild(tr);

            const reader = new FileReader();
            reader.onload = ({target}) => {
                link.href = target.result;
            };
            reader.readAsDataURL(entry.file);
        }
    </script>

</body>
</html>
