<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>ランダム音声プレイヤー</title>
  <style>
    body { font-family: sans-serif; padding: 20px; }
    #controls { margin: 10px 0; }
  </style>
</head>
<body>
  <h1>ランダム音声プレイヤー</h1>

  <div id="controls">
    <button id="playRandomBtn">ランダム再生</button>
    <button id="nextBtn">次の音声</button>
  </div>

  <audio id="player" controls></audio>
  <div id="status"></div>

  <script>
    const player = document.getElementById('player');
    const playRandomBtn = document.getElementById('playRandomBtn');
    const nextBtn = document.getElementById('nextBtn');
    const status = document.getElementById('status');

    // ★ Safari で安定させるための「固定リスト」
    const audioFiles = [
      "01. A Dream More Scarlet than Red.mp3",
      "01. Ghostly Dream ~ Snow or Cherry Petal.mp3",
      "01. Shrine Maiden Crowned with Glory.mp3",
      "02. A Soul as Scarlet as a Ground Cherry.mp3",
      "02. Beloved Dwelling of Dust.mp3",
      "03. Apparitions Stalk the Night.mp3",
      "03. Even if Forgotten by the World.mp3",
      "04. Lunate Elf.mp3",
      "05. Tomboyish Girl in Love.mp3",
      "06. Shanghai Scarlet Teahouse ~ Chinese Tea.mp3",
      "06. The Gensokyo the Gods Loved.mp3",
      "07. Shanghai Alice of Meiji 17.mp3",
      "09. Satori Maiden ~ 3rd eye.mp3",
      "10. Love-Colored Master Spark.mp3",
      "13. Septette for a Dead Princess.mp3",
      "14. The Centennial Festival for Magical Girls.mp3",
      "15. Hallucination Atop a Bivalve.mp3",
      "15. Hartmann's Youkai Girl.mp3",
      "15. U.N. Owen Was Her.mp3",
      "17. Extend Ash ~ Person of Hourai (1).mp3",
      "17. Extend Ash ~ Person of Hourai.mp3",
      "18. Necrofantasia.mp3",
      "18. Reach for the Moon, Immortal Smoke.mp3",
      "x00_title.flac",
      "x01_stage1.flac",
      "x02_ubame.flac",
      "x16_bossx.flac"
    ];

    function playRandom() {
      const file = audioFiles[Math.floor(Math.random() * audioFiles.length)];
      player.src = file;
      player.play();
      status.textContent = `再生中: ${file}`;
    }

    playRandomBtn.addEventListener('click', playRandom);
    nextBtn.addEventListener('click', playRandom);

    player.addEventListener('ended', playRandom);
  </script>
</body>
</html>
