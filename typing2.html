 <!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>ローマ字タイピング</title>
  <style>
    body { font-family: sans-serif; padding: 40px; line-height: 1.8; }
    #stats { font-size: 1.2em; margin-bottom: 20px; }
    #japanese, #romaji {
      font-size: 1.1em;
      white-space: pre-wrap;
      margin-bottom: 10px;
    }
    #romaji {
      border: 1px solid #ccc;
      padding: 10px;
      background: #f9f9f9;
    }
    .typed { color: gray; }
    .current { background: yellow; }
  </style>
</head>

<body>

  <iframe width="560" height="315" src="https://www.youtube.com/embed/skCiZ9IJmZY" 
    title="YouTube video player" frameborder="0" allowfullscreen></iframe>

  <div id="stats">
    打鍵数: <span id="keystrokes">0</span>｜スピード: <span id="speed">0.00</span> 打/秒
  </div>
  <div id="japanese"></div>
  <div id="romaji"></div>

  <script>

const sentences = [
  { jp: "月には叢雲　華には風と", hira: "つきにはむらくも　はなにはかぜと" },
  { jp: "朧深に隠れた　焦燥", hira: "おぼろぶかにかくれた　しょうそう" },
  { jp: "瞼焼き付いた顔", hira: "まぶたやきついたかお" },
  { jp: "理解者の証さえ", hira: "りかいしゃのあかしさえ" },
  { jp: "刹那、退屈の隙間贖い　心燻り", hira: "せつな、たいくつのすきまあがない　こころいぶり" },
  { jp: "不安を産み出した", hira: "ふあんをうみだした" },
  { jp: "盲目、消えた安らぎに出会って", hira: "もうもく、きえたやすらぎにであって" },
  { jp: "芽生えた恋情　譲る気は無い", hira: "めばえたれんじょう　ゆずるきはない" },
  { jp: "月には叢雲　華には風と", hira: "つきにはむらくも　はなにはかぜと" },
  { jp: "此方より彼方へ永久　築けぬなら", hira: "こちらよりかなたへとわ　きずけぬなら" },
  { jp: "築けぬなら", hira: "きずけぬなら" },
  { jp: "雲突き抜け　ぬけて　風斬り裂いて", hira: "くもつきぬけ　ぬけて　かぜきりさいて" },
  { jp: "久遠の揺蕩いへ　誘う", hira: "くおんのたゆたいへ　いざなう" },
  { jp: "指と指が絡まり", hira: "ゆびとゆびがからまり" },
  { jp: "孤独を枯らしてゆく", hira: "こどくをからしてゆく" },
  { jp: "真摯ゆえの想いの偏りは", hira: "しんしゆえのおもいのかたよりは" },
  { jp: "互いの意思を　繋ぐ要にして", hira: "たがいのいしを　つなぐかなめにして" },
  { jp: "毒にも似たこの絆は", hira: "どくにもにたこのきずなは" },
  { jp: "僅かな終焉の予感じゃ　千切れはしない", hira: "わずかなしゅうえんのよかんじゃ　ちぎれはしない" },
  { jp: "月には叢雲　華には風と", hira: "つきにはむらくも　はなにはかぜと" },
  { jp: "たとえ愛の唄が永久　届かぬとも", hira: "たとえあいのうたがとわ　とどかぬとも" },
  { jp: "届かぬとも", hira: "とどかぬとも" },
  { jp: "待ち続けようずっと輪廻の時を", hira: "まちつづけようずっとりんねのときを" },
  { jp: "慈しむ心に　誓って", hira: "いつくしむこころに　ちかって" },
  { jp: "盲目消えた安らぎに出会って", hira: "もうもくきえたやすらぎにであって" },
  { jp: "芽生えた恋情　譲る気は無い", hira: "めばえたれんじょう　ゆずるきはない" },
  { jp: "ない", hira: "ない" },
  { jp: "月には叢雲　華には風と", hira: "つきにはむらくも　はなにはかぜと" },
  { jp: "此方より彼方へ永久　築けぬなら", hira: "こちらよりかなたへとわ　きずけぬなら" },
  { jp: "築けぬなら", hira: "きずけぬなら" },
  { jp: "雲突き抜け　抜けて　風斬り裂いて", hira: "くもつきぬけ　ぬけて　かぜきりさいて" },
  { jp: "久遠の揺蕩いへ　誘う", hira: "くおんのたゆたいへ　いざなう" },
  { jp: "月には叢雲　華には風と", hira: "つきにはむらくも　はなにはかぜと" },
  { jp: "たとえ愛の唄が永久　届かぬとも", hira: "たとえあいのうたがとわ　とどかぬとも" },
  { jp: "届かぬとも", hira: "とどかぬとも" },
  { jp: "待ち続けよう　ずっと　輪廻の時を", hira: "まちつづけよう　ずっと　りんねのときを" },
  { jp: "慈しむ心に　誓って", hira: "いつくしむこころに　ちかって" }
];



 
 const romajiMap = {
      "あ": "a",  "い": "i",  "う": "u",  "え": "e",  "お": "o",
      "か": "ka", "き": "ki", "く": "ku", "け": "ke", "こ": "ko",
      "さ": "sa", "し": "shi","す": "su", "せ": "se", "そ": "so",
      "た": "ta", "ち": "ti","つ": "tu","て": "te", "と": "to",
      "な": "na", "に": "ni", "ぬ": "nu", "ね": "ne", "の": "no",
      "は": "ha", "ひ": "hi", "ふ": "fu", "へ": "he", "ほ": "ho",
      "ま": "ma", "み": "mi", "む": "mu", "め": "me", "も": "mo",
      "や": "ya", "ゆ": "yu", "よ": "yo",
      "ら": "ra", "り": "ri", "る": "ru", "れ": "re", "ろ": "ro",
      "わ": "wa", "を": "wo", "ん": "nn",
      "が": "ga", "ぎ": "gi", "ぐ": "gu", "げ": "ge", "ご": "go",
      "ざ": "za", "じ": "ji", "ず": "zu", "ぜ": "ze", "ぞ": "zo",
      "だ": "da", "ぢ": "ji", "づ": "zu", "で": "de", "ど": "do",
      "ば": "ba", "び": "bi", "ぶ": "bu", "べ": "be", "ぼ": "bo",
      "ぱ": "pa", "ぴ": "pi", "ぷ": "pu", "ぺ": "pe", "ぽ": "po",
      "ゃ": "xya", "ゅ": "xyu", "ょ": "xyo",
      "っ": "xtu",
      "ー": "-",
      "、": ",", "。": ".", "？": "?"
    };

    function convertToRomaji(text) {
      let result = "";
      for (let i = 0; i < text.length; i++) {
        const c = text[i];
        result += romajiMap[c] || c;
      }
      return result;
    }

    const japaneseDiv = document.getElementById("japanese");
    const romajiDiv = document.getElementById("romaji");
    const keystrokesDisplay = document.getElementById("keystrokes");
    const speedDisplay = document.getElementById("speed");

    let currentSentence = 0;
    let currentIndex = 0;
    let keystrokes = 0;
    let startTime = null;
    let romajiText = "";

    function loadSentence(index) {
      const s = sentences[index];
      japaneseDiv.textContent = s.jp;
      romajiText = convertToRomaji(s.hira);
      currentIndex = 0;
      romajiDiv.innerHTML = `<span class="current">${romajiText[0]}</span>${romajiText.slice(1)}`;
    }

    document.addEventListener("keydown", (e) => {
      if (!startTime) startTime = Date.now();
      const key = e.key;
      if (key.length === 1 || key === "Enter") {
        keystrokes++;
        keystrokesDisplay.textContent = keystrokes;

        const expected = romajiText[currentIndex];
        const input = key === "Enter" ? "\n" : key;

        if (input === expected) {
          currentIndex++;
          const elapsed = (Date.now() - startTime) / 1000;
          speedDisplay.textContent = (keystrokes / elapsed).toFixed(2);

          const typed = `<span class="typed">${romajiText.slice(0, currentIndex)}</span>`;
          const current = `<span class="current">${romajiText[currentIndex] || ""}</span>`;
          const rest = romajiText.slice(currentIndex + 1);
          romajiDiv.innerHTML = typed + current + rest;

          if (currentIndex >= romajiText.length) {
            currentSentence++;
            if (currentSentence < sentences.length) {
              setTimeout(() => loadSentence(currentSentence), 300);
            } else {
              alert("終わりだ。");
              romajiDiv.innerHTML = "";
              japaneseDiv.textContent = "";
            }
          }
        }
      }
    });

    loadSentence(currentSentence);
  </script>
</body>
</html>
