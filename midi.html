<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>MIDIファイル再生</title>
    <!-- ライブラリの読み込み -->
    <script src="https://jsdelivr.net"></script>
    <style>
        body { font-family: sans-serif; padding: 20px; }
        .controls { margin-bottom: 20px; }
        midi-player { display: block; width: 100%; margin: 10px 0; }
        midi-visualizer { display: block; width: 100%; height: 200px; }
    </style>
</head>
<body>

    <h3>MIDIファイルを選択して再生</h3>

    <div class="controls">
        <!-- ファイル選択ボタン -->
        <input type="file" id="fileInput" accept=".mid,.midi">
    </div>

    <!-- プレイヤー（初期状態のsrcは空） -->
    <midi-player
        id="myPlayer"
        sound-font="https://googleapis.com"
        visualizer="#myVisualizer">
    </midi-player>

    <!-- ビジュアライザー -->
    <midi-visualizer type="piano-roll" id="myVisualizer"></midi-visualizer>

    <script>
        const fileInput = document.getElementById('fileInput');
        const player = document.getElementById('myPlayer');
        const visualizer = document.getElementById('myVisualizer');

        fileInput.addEventListener('change', (event) => {
            const file = event.target.files[0];
            if (file) {
                // 1. 選択されたファイルのURLを作成
                const fileURL = URL.createObjectURL(file);

                // 2. プレイヤーとビジュアライザーにURLをセット
                player.src = fileURL;
                visualizer.src = fileURL;
            }
        });
    </script>

</body>
</html>
