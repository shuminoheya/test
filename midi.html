<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>MIDI Player</title>

  <script src="https://cdn.jsdelivr.net/combine/npm/tone@14.7.58,npm/@magenta/music@1.22.1/dist/magentamusic.min.js,npm/html-midi-player@1.4.0"></script>
</head>
<body>

  <input type="file" id="fileInput" accept=".mid,.midi">

  <midi-player id="player" sound-font></midi-player>

  <script>
    const input = document.getElementById('fileInput');
    const player = document.getElementById('player');

    input.addEventListener('change', () => {
      const file = input.files[0];
      if (!file) return;
      player.src = URL.createObjectURL(file);
    });
  </script>

</body>
</html>
