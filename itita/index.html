<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>スーパーウルトラミラクルすごいクイズ</title>
    <style>
        #start {
            display: flex;
            justify-content: center;
        }

        #mitame_kaizou_kaitou {
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #monndai_seiri {
            display: flex;
            justify-content: center;
            font-size: 60px;
        }

        #monndai_soto {
            display: flex;
            justify-content: center;
        }

        h3 {
            display: flex;
            justify-content: center;
        }

        #monndai_maru_honntai {
            font-size: 20px;
        }

        #tugino_button_seiri {
            display: flex;
            justify-content: center;
            font-size: 20px;
        }

    </style>
</head>

<body>
    <h1 id="monndai_soto"></h1>
    <p id="monndai_seiri">
        <ruby>
            <span id="monndai"></span>
            </rt><rt id="monndai_maru_honntai">
        </ruby>
    </p>
    <dialog id="myDialog">
        <p>クイズの答えは<strong>ひらがな</strong>で入力してね<br>嫌なら今すぐCtrl+wしな</br></p>
        <button id="closeBtn" onclick="kuizu_start()">理解できた賢い人間(チンパンジー以上)だけが押せるボタン</button>
    </dialog>

    <p id="start"><button id="openBtn">クイズを始める❤</button></p>
    <script src="クイズ.js"></script>
</body>

</html>
