<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>ローマ字タイピング</title>
  <style>
    body { font-family: sans-serif; padding: 40px; line-height: 1.8; }
    #stats { font-size: 1.2em; margin-bottom: 20px; }
    #japanese, #romaji {
      font-size: 1.1em;
      white-space: pre-wrap;
      margin-bottom: 10px;
    }
    #romaji {
      border: 1px solid #ccc;
      padding: 10px;
      background: #f9f9f9;
    }
    .typed { color: gray; }
    .current { background: yellow; }
  </style>
</head>

<body>

  <iframe width="560" height="315" src="https://www.youtube.com/embed/NpgaGhAW9So"
    title="YouTube video player" frameborder="0" allowfullscreen></iframe>

  <div id="stats">
    打鍵数: <span id="keystrokes">0</span>｜
    ミス: <span id="miss">0</span>｜
    スピード: <span id="speed">0.00</span> 打/秒
  </div>

  <div id="japanese"></div>
  <div id="romaji"></div>

<script>
/* ============================================================
   1. 基本ローマ字表
   ============================================================ */
const BASE_ROMAJI = {
  " ": [" "],
  "あ":["a"], "い":["i"], "う":["u"], "え":["e"], "お":["o"],
  "か":["ka"], "き":["ki"], "く":["ku"], "け":["ke"], "こ":["ko"],
  "さ":["sa"], "し":["shi","si","ci"],
  "す":["su"], "せ":["se"], "そ":["so"],
  "た":["ta"], "ち":["chi","ti"],
  "つ":["tsu","tu"], "て":["te"], "と":["to"],
  "な":["na"], "に":["ni"], "ぬ":["nu"], "ね":["ne"], "の":["no"],
  "は":["ha"], "ひ":["hi"], "ふ":["fu","hu"], "へ":["he"], "ほ":["ho"],
  "ま":["ma"], "み":["mi"], "む":["mu"], "め":["me"], "も":["mo"],
  "や":["ya"], "ゆ":["yu"], "よ":["yo"],
  "ら":["ra"], "り":["ri"], "る":["ru"], "れ":["re"], "ろ":["ro"],
  "わ":["wa"], "を":["wo"], "ん":["n","nn","n'"],
  "が":["ga"], "ぎ":["gi"], "ぐ":["gu"], "げ":["ge"], "ご":["go"],
  "ざ":["za"], "じ":["ji","zi"],
  "ず":["zu"], "ぜ":["ze"], "ぞ":["zo"],
  "だ":["da"], "ぢ":["ji","di"], "づ":["zu","du"], "で":["de"], "ど":["do"],
  "ば":["ba"], "び":["bi"], "ぶ":["bu"], "べ":["be"], "ぼ":["bo"],
  "ぱ":["pa"], "ぴ":["pi"], "ぷ":["pu"], "ぺ":["pe"], "ぽ":["po"],
  "っ":["xtu","ttu"]
};

/* ============================================================
   2. 拗音の二段階変換を自動生成
   ============================================================ */
const SMALL = { "ゃ":"ya", "ゅ":"yu", "ょ":"yo" };

function generateYouon(kana) {
  const base = kana[0];
  const small = SMALL[kana[1]];

  let roots = [];

  if (base === "し") roots = ["sh","sy","si","shi"];
  else if (base === "ち") roots = ["ch","ty","ti","chi"];
  else if (base === "じ") roots = ["j","zy","zi","ji"];
　else if (base === "き") roots = ["k","cy","ci","ki"];
  else {
    // それ以外の行（にゃ、ひゃ、みゃ等）は標準だけでOK
    const def = BASE_ROMAJI[base][0];
    const head = def[0];
    roots = [head];
  }

  const out = [];

  for (const r of roots) {
    // 標準
    out.push(r + small);

    // si/shi/ti/chi/zi/ji 系 → 二段階変換
    if (r.endsWith("i")) {
      out.push(r + "x" + small);
      out.push(r + "l" + small);
    }
  }

  return out;
}

/* ============================================================
   3. ROMAJI を拡張（拗音に二段階変換を追加）
   ============================================================ */
const ROMAJI = JSON.parse(JSON.stringify(BASE_ROMAJI));

["しゃ","しゅ","しょ","ちゃ","ちゅ","ちょ","じゃ","じゅ","じょ","きゅ"].forEach(k => {
  ROMAJI[k] = generateYouon(k);
});

/* ============================================================
   4. かな → 音節分割
   ============================================================ */
function splitKana(text) {
  const res = [];
  for (let i = 0; i < text.length; i++) {
    const c = text[i];
    const n = text[i+1];
    if ("ゃゅょ".includes(n)) {
      res.push(c+n);
      i++;
    } else {
      res.push(c);
    }
  }
  return res;
}

/* ============================================================
   5. タイピングゲーム本体
   ============================================================ */
const sentences = [
  { jp: "色は匂へど いつか散りぬるを", hira: "いろはにおえど いつかちりぬるを" },
  { jp: "さ迷う事さえ 許せなかった", hira: "さまようことさえ ゆるせなかつた" },
  { jp: "咲き誇る花はいつか", hira: "さきほこるはなはいつか" },
  { jp: "教えてくれた 生きるだけでは罪と", hira: "おしえてくれた いきるだけではつみと" },
  { jp: "離れられない 離せはしないと", hira: "はなれられない はなせはしないと" },
  { jp: "抱く思いは 心を躍らせるばかり", hira: "いだくおもいは こころをおどらせるばかり" },
  { jp: "色は匂へど いつか散りぬるを", hira: "いろはにおえど いつかちりぬるを" },
  { jp: "さ迷う暇はない けれど後退り", hira: "さまようひまはない けれどあとずさり" },
  { jp: "甘えるか弱さと 甘えられぬ弱さで", hira: "あまえるかよわさと あまえられぬよわさで" },
  { jp: "悪夢が優しく私を弄ぶ", hira: "あくむがやさしくわたしをもてあそぶ" },
  { jp: "弱さ知るアナタは今", hira: "よわさしるあなたはいま" },
  { jp: "許してくれた 求める者の欲を", hira: "ゆるしてくれた もとめるもののよくを" },
  { jp: "健気に咲いた 刹那の美しさ", hira: "けなげにさいた せつなのうつくしさ" },
  { jp: "それを知るには 遅すぎたのかもしれない", hira: "それをしるには おそすぎたのかもしれない" },
  { jp: "色は匂へど いつか散りぬるを", hira: "いろはにおえど いつかちりぬるを" },
  { jp: "アナタのすべてに 幼く委ねたい", hira: "あなたのすべてに おさなくゆだねたい" },
  { jp: "許せぬ優しさと 揺るぐ独占欲は", hira: "ゆるせぬやさしさと ゆるぐどくせんよくは" },
  { jp: "秤にかけれぬ 我儘な愛", hira: "はかりにかけれぬ わがままなあい" },
  { jp: "色は匂へど すべて散りぬるを", hira: "いろはにおえど すべてちりぬるを" },
  { jp: "短き記憶に 溢れる想い", hira: "みじかききおくに あふれるおもい" },
  { jp: "枯れゆく命よ 儚く強くあれ", hira: "かれゆくいのちよ はかなくつよくあれ" },
  { jp: "無慈悲で優しい 時のように", hira: "むじひでやさしい ときのように" }
];
let currentSentence = 0;
let syllables = [];
let fixed = [];
let buffer = "";
let idx = 0;

let keystrokes = 0;
let miss = 0;
let startTime = null;

const jpDiv = document.getElementById("japanese");
const romaDiv = document.getElementById("romaji");
const ksDisp = document.getElementById("keystrokes");
const missDisp = document.getElementById("miss");
const speedDisp = document.getElementById("speed");

/* ============================================================
   6. 表示更新
   ============================================================ */
function buildRomaji() {
  let out = "";
  for (let i = 0; i < syllables.length; i++) {
    const kana = syllables[i];
    const list = ROMAJI[kana] || [kana];

    if (i < idx) {
      out += fixed[i];
    } else if (i === idx) {
      if (!buffer) out += list[0];
      else {
        const m = list.filter(c => c.startsWith(buffer));
        out += (m[0] || list[0]);
      }
    } else {
      out += list[0];
    }
  }
  return out;
}

function typedLen() {
  let len = 0;
  for (let i = 0; i < idx; i++) len += fixed[i].length;
  len += buffer.length;
  return len;
}

function updateDisplay() {
  const r = buildRomaji();
  const t = typedLen();
  romaDiv.innerHTML =
    `<span class="typed">${r.slice(0,t)}</span>` +
    `<span class="current">${r[t] || ""}</span>` +
    r.slice(t+1);
}

/* ============================================================
   7. 文ロード.
   ============================================================ */
function loadSentence(n) {
  const s = sentences[n];
  jpDiv.textContent = s.jp;

  syllables = splitKana(s.hira);
  fixed = new Array(syllables.length).fill("");
  buffer = "";
  idx = 0;

  keystrokes = 0;
  miss = 0;
  startTime = Date.now();  // ★ 文開始時刻を固定

  ksDisp.textContent = "0";
  missDisp.textContent = "0";
  speedDisp.textContent = "0.00";

  updateDisplay();
}

/* ============================================================
   8. 特殊途中入力（sh / ch）
   ============================================================ */
function isSpecialPrefix(kana, buf) {
  if (kana === "し" && buf === "sh") return true;
  if (kana === "ち" && buf === "ch") return true;
  return false;
}

/* ============================================================
   9. キー入力
   ============================================================ */
document.addEventListener("keydown", e => {
  const key = e.key;
  if (key.length !== 1) return;

  keystrokes++;
  ksDisp.textContent = keystrokes;

  const kana = syllables[idx];
  const list = ROMAJI[kana] || [kana];

  buffer += key;

  let matches = list.filter(c => c.startsWith(buffer));

  if (matches.length === 0 && isSpecialPrefix(kana, buffer)) {
    updateDisplay();
    return;
  }

  if (matches.length === 0) {
    miss++;
    missDisp.textContent = miss;
    buffer = "";
    updateDisplay();
    return;
  }

  updateDisplay();

  if (list.includes(buffer)) {
    fixed[idx] = buffer;
    buffer = "";
    idx++;

    const elapsed = (Date.now() - startTime) / 1000;
    speedDisp.textContent = (keystrokes / elapsed).toFixed(2);

    if (idx >= syllables.length) {
      currentSentence++;
      if (currentSentence < sentences.length) {
        setTimeout(() => loadSentence(currentSentence), 300);
      } else {
        alert("終わりだ。");
      }
      return;
    }
    updateDisplay();
  }
});

loadSentence(currentSentence);
</script>

</body>
</html>
