<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>アーカイブ展開ビューア</title>
<style>
  body { font-family: sans-serif; margin: 0; background: #f5f5f5; }
  header {
    display: flex; justify-content: space-between; align-items: center;
    padding: 10px 16px; background: #e1e4e8; border-bottom: 1px solid #ccc;
  }
  #fileList { width: 100%; border-collapse: collapse; background: #fff; }
  th, td { padding: 6px 8px; border-bottom: 1px solid #eee; }
  tr:hover { background: #eaf3ff; cursor: pointer; }
  button { padding: 6px 12px; }
</style>

<script src="libarchive.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
</head>

<body>
<header>
  <div>
    <input type="file" id="archiveInput">
  </div>
  <div>
    <button id="zipDownload">ZIP変換ダウンロード</button>
  </div>
</header>

<table id="fileList">
  <thead>
    <tr><th>名前</th><th>サイズ</th></tr>
  </thead>
  <tbody id="tbody"></tbody>
</table>

<script>
let extractedFiles = [];

function formatSize(b) {
  if (b > 1024*1024) return (b/1024/1024).toFixed(1)+" MB";
  if (b > 1024) return (b/1024).toFixed(1)+" KB";
  return b+" B";
}

document.getElementById("archiveInput").addEventListener("change", async (e) => {
  const file = e.target.files[0];
  if (!file) return;

  const buf = await file.arrayBuffer();
  const archive = await Archive.open(buf);

  extractedFiles = [];
  const tbody = document.getElementById("tbody");
  tbody.innerHTML = "";

  for await (const entry of archive) {
    if (entry.filetype === "file") {
      const data = await entry.readData();
      extractedFiles.push({ name: entry.pathname, blob: new Blob([data]) });

      const tr = document.createElement("tr");
      tr.innerHTML = `<td>${entry.pathname}</td><td>${formatSize(data.byteLength)}</td>`;
      tr.onclick = () => {
        const url = URL.createObjectURL(new Blob([data]));
        const a = document.createElement("a");
        a.href = url;
        a.download = entry.pathname.split("/").pop();
        a.click();
        URL.revokeObjectURL(url);
      };
      tbody.appendChild(tr);
    }
  }
});

// ZIP まとめてダウンロード
document.getElementById("zipDownload").addEventListener("click", async () => {
  if (!extractedFiles.length) {
    alert("先にアーカイブを読み込んでください");
    return;
  }

  const zip = new JSZip();
  extractedFiles.forEach(f => zip.file(f.name, f.blob));

  const blob = await zip.generateAsync({ type: "blob" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = "converted.zip";
  a.click();
  URL.revokeObjectURL(url);
});
</script>
</body>
</html>
