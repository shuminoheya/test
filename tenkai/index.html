<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>libarchivejs Explorer 完全版</title>
<style>
  body { margin: 0; font-family: sans-serif; display: flex; height: 100vh; }
  #sidebar {
    width: 280px; background: #f0f0f0; overflow-y: auto;
    border-right: 1px solid #ccc; padding: 10px;
  }
  #content {
    flex: 1; display: flex; flex-direction: column;
  }
  #toolbar {
    padding: 8px; background: #e1e4e8; border-bottom: 1px solid #ccc;
    display: flex; justify-content: space-between; align-items: center;
  }
  #preview {
    flex: 1; padding: 10px; overflow: auto; background: #fff;
  }
  ul { list-style: none; padding-left: 16px; }
  li { cursor: pointer; padding: 2px 0; }
  li:hover { background: #dceeff; }
  .folder { font-weight: bold; }
  .file { color: #333; }
  #dropzone {
    border: 2px dashed #888; padding: 20px; text-align: center;
    margin-bottom: 10px; background: #fafafa;
  }
</style>

<script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>

<script type="module">
import { Archive } from "./libarchive.js";

let extracted = [];

async function init() {
  await Archive.init({ workerUrl: "./worker-bundle.js" });
  console.log("libarchivejs ready");
}

function buildTree(files) {
  const root = {};

  for (const f of files) {
    const parts = f.path.split("/");
    let cur = root;

    for (let i = 0; i < parts.length; i++) {
      const p = parts[i];
      if (!cur[p]) cur[p] = { __files: [], __dirs: {} };

      if (i === parts.length - 1) {
        cur[p].__files.push(f);
      } else {
        cur = cur[p].__dirs;
      }
    }
  }
  return root;
}

function renderTree(node, parent) {
  const ul = document.createElement("ul");

  for (const key in node) {
    const item = node[key];
    const li = document.createElement("li");

    if (item.__files.length === 0 && Object.keys(item.__dirs).length > 0) {
      li.textContent = "📁 " + key;
      li.classList.add("folder");
      li.onclick = () => {
        li.classList.toggle("open");
        if (li.classList.contains("open")) {
          const child = renderTree(item.__dirs, li);
          li.appendChild(child);
        } else {
          const child = li.querySelector("ul");
          if (child) child.remove();
        }
      };
    } else {
      li.textContent = "📄 " + key;
      li.classList.add("file");
      li.onclick = () => previewFile(item.__files[0]);
    }

    ul.appendChild(li);
  }

  parent.appendChild(ul);
  return ul;
}

function previewFile(fileObj) {
  const preview = document.getElementById("preview");
  preview.innerHTML = "";

  const blob = new Blob([fileObj.data]);
  const url = URL.createObjectURL(blob);

  if (fileObj.name.match(/\.(png|jpg|jpeg|gif|webp)$/i)) {
    const img = document.createElement("img");
    img.src = url;
    img.style.maxWidth = "100%";
    preview.appendChild(img);
  } else if (fileObj.name.match(/\.(txt|md|json|xml|html|css|js)$/i)) {
    blob.text().then(text => {
      const pre = document.createElement("pre");
      pre.textContent = text;
      preview.appendChild(pre);
    });
  } else {
    const a = document.createElement("a");
    a.href = url;
    a.download = fileObj.name;
    a.textContent = "ダウンロード: " + fileObj.name;
    preview.appendChild(a);
  }
}

async function openArchive(file) {
  const buf = await file.arrayBuffer();
  const archive = await Archive.open(buf);

  extracted = [];
  for (const entry of archive.entries()) {
    if (entry.filetype !== "file") continue;

    const data = await entry.readData();
    const path = entry.pathname;
    const name = path.split("/").pop();

    extracted.push({ path, name, data });
  }

  const tree = buildTree(extracted);
  const sidebar = document.getElementById("sidebar");
  sidebar.innerHTML = "";
  renderTree(tree, sidebar);
}

document.getElementById("fileInput").addEventListener("change", e => {
  const file = e.target.files[0];
  if (file) openArchive(file);
});

document.getElementById("zipBtn").addEventListener("click", async () => {
  if (!extracted.length) return alert("先にアーカイブを読み込んでください");

  const zip = new JSZip();
  extracted.forEach(f => zip.file(f.path, f.data));

  const blob = await zip.generateAsync({ type: "blob" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = "converted.zip";
  a.click();
});

const dropzone = document.getElementById("dropzone");
dropzone.addEventListener("dragover", e => {
  e.preventDefault();
  dropzone.style.background = "#eef";
});
dropzone.addEventListener("dragleave", () => {
  dropzone.style.background = "#fafafa";
});
dropzone.addEventListener("drop", e => {
  e.preventDefault();
  dropzone.style.background = "#fafafa";
  const file = e.dataTransfer.files[0];
  if (file) openArchive(file);
});

init();
</script>
</head>

<body>
<div id="sidebar"></div>

<div id="content">
  <div id="toolbar">
    <div>
      <input id="fileInput" type="file">
    </div>
    <button id="zipBtn">ZIP変換ダウンロード</button>
  </div>

  <div id="dropzone">ここにファイルをドラッグ＆ドロップ</div>

  <div id="preview">ここにプレビューが表示されます</div>
</div>
</body>
</html>
