<!doctype html>
<html>
  <head>
    <title>test webworker</title>
  </head>
  <body>
    <input type="file" id="file" />

    <script type="module">
      function finish() {
        const d = document.createElement("div");
        d.setAttribute("id", "done");
        d.textContent = "Done.";
        document.body.appendChild(d);
      }

      /* ★ ここを修正：同じフォルダにある libarchive.js を読み込む */
      import { Archive } from "./libarchive.js";

      /* ★ checksum-utils.mjs が無いなら削除してOK */
      // import { fileChecksums } from "../checksum-utils.mjs";

      /* ★ workerUrl も同じフォルダにある worker-bundle.js を指定 */
      Archive.init({
        workerUrl: "./worker-bundle.js",
      });

      window.Archive = Archive;

      document.getElementById("file").addEventListener("change", async (e) => {
        let obj = null;
        try {
          const file = e.currentTarget.files[0];

          /* ★ Archive.open は File/Blob/ArrayBuffer どれでもOK */
          const archive = await Archive.open(file);

          /* ★ 展開してオブジェクトとして取得 */
          obj = await archive.extractFiles();

          /* ★ checksum-utils.mjs が無いならコメントアウト */
          // obj = await fileChecksums(obj);

        } catch (err) {
          console.error(err);
        } finally {
          window.obj = obj;
          finish();
        }
      });
    </script>
  </body>
</html>
