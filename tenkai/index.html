<!DOCTYPE html>
<html lang="ja">
<body>
<h3>libarchivejs 動作確認</h3>
<input type="file" id="fileInput">

<script type="module">
import { Archive } from './libarchive.js';

async function init() {
  console.log("Initializing libarchive...");
  await Archive.init({
    workerUrl: './worker-bundle.js'
  });
  console.log("libarchive initialized");
}

init().catch(err => {
  console.error("Init error:", err);
});

document.getElementById('fileInput').addEventListener('change', async e => {
  const file = e.target.files[0];
  if (!file) return;

  console.log("Opening:", file.name);

  try {
    const buf = await file.arrayBuffer();
    const archive = await Archive.open(buf);

    console.log("Archive opened. Listing entries...");

    for (const entry of archive.entries()) {
      console.log("Entry:", entry.pathname);
    }

    console.log("Done.");
  } catch (err) {
    console.error("Error opening archive:", err);
  }
});
</script>
</body>
</html>
