<!DOCTYPE html>
<html lang="ja">
<body>
<h2>libarchivejs ロードテスト</h2>
<div id="status">読み込み中...</div>

<script type="module">
import { Archive } from './libarchive.js';

const status = document.getElementById('status');

async function test() {
  try {
    status.textContent = "libarchive.js 読み込み成功";

    await Archive.init({
      workerUrl: './worker-bundle.js'
    });

    status.textContent = "libarchive.js / worker-bundle.js / libarchive.wasm のロード成功";
  } catch (err) {
    status.textContent = "エラー: " + err;
    console.error(err);
  }
}

test();
</script>
</body>
</html>
