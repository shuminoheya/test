<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>歴史的仮名遣い → 現代仮名遣い</title>
<style>
  body { font-family: sans-serif; padding: 20px; line-height: 1.7; }
  textarea { width: 100%; height: 180px; font-size: 15px; }
  button { padding: 10px 20px; margin: 12px 0; font-size: 15px; }
</style>
</head>
<body>

<h1>歴史的仮名遣い → 現代仮名遣い</h1>

<textarea id="input" placeholder="例：けふはよきひなり。"></textarea>
<button id="convert">変換</button>
<textarea id="output" placeholder="変換結果がここに表示されます。"></textarea>

<script>
function convertKana(text) {
  let t = text;

  // 0. くわ・ぐわ → か・が
  t = t.replace(/くわ/g, "か").replace(/ぐわ/g, "が")
       .replace(/クワ/g, "カ").replace(/グワ/g, "ガ");

  // 1. ゐ・ゑ → い・え
  t = t.replace(/ゐ/g, "い").replace(/ヰ/g, "イ")
       .replace(/ゑ/g, "え").replace(/ヱ/g, "エ");

  // 2. 語中の「を」→「お」助詞の「を」は保持
  t = t.replace(/([^ \n\r、。！？!?])を/g, "$1お")
       .replace(/([^ \n\r、。！？!?])ヲ/g, "$1オ");

  // 3. ぢ・づ → じ・ず
  t = t.replace(/ぢ/g, "じ").replace(/ヂ/g, "ジ")
       .replace(/づ/g, "ず").replace(/ヅ/g, "ズ");

  // 4. 語尾の「む」→「ん」
  t = t.replace(/む(?=$|[ \n\r、。！？!?])/g, "ん")
       .replace(/ム(?=$|[ \n\r、。！？!?])/g, "ン");

  // 5. は・ひ・ふ・へ・ほ → わ・い・う・え・お（語中・語尾）
  t = t.replace(/は/g, "わ").replace(/ひ/g, "い").replace(/ふ/g, "う")
       .replace(/へ/g, "え").replace(/ほ/g, "お")
       .replace(/ハ/g, "ワ").replace(/ヒ/g, "イ").replace(/フ/g, "ウ")
       .replace(/ヘ/g, "エ").replace(/ホ/g, "オ");

  // 助詞「は」「へ」を戻す
  t = t.replace(/わ(?=[ \n\r、。！？!?])/g, "は")
       .replace(/え(?=[ \n\r、。！？!?])/g, "へ")
       .replace(/ワ(?=[ \n\r、。！？!?])/g, "ハ")
       .replace(/エ(?=[ \n\r、。！？!?])/g, "ヘ");

  // 6. 長音変換
  t = t.replace(/あう/g, "おう").replace(/アウ/g, "オウ")
       .replace(/いう/g, "ゆう").replace(/イウ/g, "ユウ")
       .replace(/えう/g, "よう").replace(/エウ/g, "ヨウ");

  return t;
}

document.getElementById("convert").onclick = () => {
  document.getElementById("output").value =
    convertKana(document.getElementById("input").value);
};
</script>

</body>
</html>
